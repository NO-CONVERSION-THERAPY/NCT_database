name = "nct-database-test"
main = "src/worker/index.ts"
compatibility_date = "2026-04-19"
workers_dev = true

[observability.logs]
enabled = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "nct-database-test"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "EXPORT_BUCKET"
bucket_name = "nct-database-test-exports"
preview_bucket_name = "nct-database-test-exports-preview"

[vars]
APP_NAME = "NCT API SQL Test"
DEFAULT_ENCRYPT_FIELDS = "name,phone,email,idCard"
EXPORT_EMAIL_TO = ""
EXPORT_EMAIL_FROM = ""
SUB_PULL_MAX_ATTEMPTS = "5"
SUB_PULL_RETRY_DELAY_MS = "60000"
